# =============================================
# Elev8 Chat Backend - Application Configuration
# =============================================

# Server port (React runs on 5173, backend on 8080)
server.port=8080

# ---- H2 In-Memory Database ----
# "mem:elev8chat" is the DB name (lives only in RAM while server is running)
spring.datasource.url=jdbc:h2:mem:elev8chat;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console (open http://localhost:8080/h2-console in browser to inspect DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
# create-drop = create tables on startup, drop on shutdown (good for demos)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
